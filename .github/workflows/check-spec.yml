name: check-spec audit

on:
  pull_request:
    paths:
      - '.arceus/changes/**'
      - 'apps/**'
      - 'packages/**'
      - 'runtime/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mikeqoo1/check-spec@v0.1.1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
